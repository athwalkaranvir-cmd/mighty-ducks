<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Mighty Ducks Stat Tracker</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(180deg,#f0efe6 0%,#e8f5e9 100%);min-height:100dvh}
button{font-family:inherit;touch-action:manipulation}input{font-family:inherit}

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
const {useState,useEffect,useRef} = React;
const TEAM="MIGHTY DUCKS";
const HITS=["1B","2B","3B","HR"];
const OUTS=["GO","SO","FO","FLO"];
const OTHER=["BB","SF","FC"];
const OC={"1B":"#4CAF50","2B":"#FF9800","3B":"#9C27B0","HR":"#F44336","BB":"#2196F3","SF":"#607D8B","FC":"#795548","GO":"#795548","SO":"#9E9E9E","FO":"#9E9E9E","FLO":"#9E9E9E"};
const OL={"1B":"Single","2B":"Double","3B":"Triple","HR":"Home Run","BB":"Walk","SF":"Sac Fly","FC":"Fielder's Choice","GO":"Ground Out","SO":"Strikeout","FO":"Foul Out","FLO":"Fly Out"};
const sv=(k,v)=>{try{localStorage.setItem("md_"+k,JSON.stringify(v))}catch(e){}};
const ld=(k,d)=>{try{const v=localStorage.getItem("md_"+k);return v?JSON.parse(v):d}catch(e){return d}};
const FM="'Fira Mono',monospace";

function Diamond({bases,last,ab}){
  const bp={home:{x:150,y:270},first:{x:255,y:165},second:{x:150,y:60},third:{x:45,y:165}};
  const hr=last==="HR";
  return(<svg viewBox="0 0 300 320" style={{width:"100%",maxWidth:300,margin:"0 auto",display:"block"}}>
    <rect x="0" y="0" width="300" height="320" rx="16" fill="#2d5016" opacity="0.15"/>
    <polygon points="150,270 255,165 150,60 45,165" fill="none" stroke="#5a3a1a" strokeWidth="2" opacity="0.5"/>
    {[["home","first"],["first","second"],["second","third"],["third","home"]].map(([f,t],i)=>
      <line key={i} x1={bp[f].x} y1={bp[f].y} x2={bp[t].x} y2={bp[t].y} stroke="#c8a96e" strokeWidth="3" opacity="0.4"/>)}
    {["first","second","third"].map(b=>{const p=bp[b],r=bases[b];return(<g key={b}>
      <rect x={p.x-14} y={p.y-14} width={28} height={28} rx={4} transform={`rotate(45 ${p.x} ${p.y})`}
        fill={r?"#FFD600":"#f5f0e0"} stroke={r?"#FF8F00":"#8d7b5a"} strokeWidth={r?3:2} style={{filter:r?"drop-shadow(0 0 12px #FFD600)":"none",transition:"all .4s"}}/>
      {r&&<circle cx={p.x} cy={p.y} r={6} fill="#1B5E20"/>}
      {r&&<text x={p.x} y={p.y+(b==="second"?-22:22)} textAnchor="middle" fill="#1B5E20" style={{fontSize:9,fontWeight:700,fontFamily:FM}}>{r}</text>}
    </g>)})}
    <polygon points="150,284 138,274 138,262 162,262 162,274" fill={hr?"#FFD600":"#f5f0e0"} stroke={hr?"#FF8F00":"#8d7b5a"} strokeWidth={2}/>
    {ab&&<text x={150} y={310} textAnchor="middle" fill="#1B5E20" style={{fontSize:11,fontWeight:700,fontFamily:FM}}>AB: {ab}</text>}
    {hr&&<circle cx={150} cy={165} r={120} fill="none" stroke="#FFD600" strokeWidth="3" opacity="0.3">
      <animate attributeName="r" from="80" to="140" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.5" to="0" dur="1s" repeatCount="indefinite"/></circle>}
  </svg>);
}

function Scoreboard({opp,ourS,oppS,isHome}){
  const oSc=ourS||{},opSc=oppS||{};
  const mx=Math.max(...[...Object.keys(oSc),...Object.keys(opSc)].map(Number).filter(n=>!isNaN(n)),1);
  const inn=[];for(let i=1;i<=mx;i++)inn.push(i);
  const ourT=Object.values(oSc).reduce((a,b)=>a+b,0),oppT=Object.values(opSc).reduce((a,b)=>a+b,0);
  const aN=isHome?(opp||"OPP"):TEAM,hN=isHome?TEAM:(opp||"OPP");
  const aS=isHome?opSc:oSc,hS=isHome?oSc:opSc;
  return(<div style={{background:"#faf8f2",borderRadius:12,padding:10,marginTop:12,border:"1px solid #e0dcc8",overflowX:"auto"}}>
    <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:FM}}>
      <thead><tr style={{background:"#1B5E20"}}>
        <th style={{padding:"5px 6px",color:"#FFD600",fontWeight:700,fontSize:9,textAlign:"left",minWidth:60}}>TEAM</th>
        {inn.map(i=><th key={i} style={{padding:"5px 3px",color:"#FFD600",fontWeight:700,fontSize:9,textAlign:"center"}}>{i}</th>)}
        <th style={{padding:"5px 5px",color:"#FFD600",fontWeight:800,fontSize:10,textAlign:"center",borderLeft:"2px solid #FFD600"}}>R</th>
      </tr></thead>
      <tbody>
        <tr style={{background:"#fff"}}><td style={{padding:"4px 6px",fontWeight:600,fontSize:10}}>{aN}</td>
          {inn.map(i=><td key={i} style={{padding:"4px 3px",textAlign:"center"}}>{aS[i]!=null?aS[i]:0}</td>)}
          <td style={{padding:"4px 5px",textAlign:"center",fontWeight:800,borderLeft:"2px solid #e0dcc8"}}>{isHome?oppT:ourT}</td></tr>
        <tr style={{background:"#f0efe6"}}><td style={{padding:"4px 6px",fontWeight:600,fontSize:10}}>{hN}</td>
          {inn.map(i=><td key={i} style={{padding:"4px 3px",textAlign:"center"}}>{hS[i]!=null?hS[i]:0}</td>)}
          <td style={{padding:"4px 5px",textAlign:"center",fontWeight:800,borderLeft:"2px solid #e0dcc8"}}>{isHome?ourT:oppT}</td></tr>
      </tbody></table></div>);
}

function aggStats(games){
  const c={};games.filter(g=>g.plays).forEach(game=>{const inG=new Set();
    (game.plays||[]).forEach(p=>{const n=p.batter,o=p.outcome;inG.add(n);
      if(!c[n])c[n]={G:0,AB:0,R:0,H:0,"1B":0,"2B":0,"3B":0,HR:0,RBI:0,BB:0,SO:0,FO:0,GO:0,SF:0,FC:0,FLO:0};
      const s=c[n];if(!["BB","SF","FC"].includes(o))s.AB++;
      if(HITS.includes(o)){s.H++;s[o]++}else if(OUTS.includes(o)){if(s[o]!==undefined)s[o]++}
      else if(o==="BB")s.BB++;else if(o==="SF")s.SF++;else if(o==="FC")s.FC++;
      s.RBI+=(p.rbi||0)});
    (game.plays||[]).forEach(p=>{(p.scoredPlayers||[]).forEach(n=>{
      if(!c[n])c[n]={G:0,AB:0,R:0,H:0,"1B":0,"2B":0,"3B":0,HR:0,RBI:0,BB:0,SO:0,FO:0,GO:0,SF:0,FC:0,FLO:0};c[n].R++})});
    inG.forEach(n=>{if(c[n])c[n].G++})});return c;
}

const MIN_PCT=0.4;// 40% of team games to qualify for rankings

// Format a rate stat baseball-style: 0.333 -> ".333", "—" when no at-bats
function fmt3(v,ab){return ab>0?v.toFixed(3).replace(/^0\./,"."):"—"}
function statLine(s){
  const ab=s.AB||0,h=s.H||0,bb=s.BB||0,sf=s.SF||0;
  const avg=ab>0?h/ab:0;
  const tb=(s["1B"]||0)+(s["2B"]||0)*2+(s["3B"]||0)*3+(s.HR||0)*4;
  const slg=ab>0?tb/ab:0;
  const pa=ab+bb+sf;const obp=pa>0?(h+bb)/pa:0;
  return{ab,avg,slg,obp};
}
// Full-roster stat tables, sized to fit a phone with no sideways scrolling.
// Split into two stacked tables because all 20 columns can't fit one screen.
function StatsTables({pl}){
  const th={padding:"8px 2px",color:"#FFD600",fontWeight:800,fontSize:9,whiteSpace:"nowrap",textAlign:"center"};
  const td={padding:"7px 2px",textAlign:"center",color:"#333",fontSize:11,fontFamily:FM};
  const nameTd={padding:"7px 4px 7px 8px",fontWeight:700,color:"#1B5E20",fontSize:11,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"};
  const Tbl=({title,cols,row})=>(
    <div style={{marginBottom:18}}>
      <div style={{fontSize:11,fontWeight:800,color:"#8d7b5a",letterSpacing:1,marginBottom:6}}>{title}</div>
      <div style={{borderRadius:12,border:"1px solid #e0dcc8",overflow:"hidden",background:"#fff"}}>
        <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
          <thead><tr style={{background:"#1B5E20"}}>
            <th style={{...th,textAlign:"left",paddingLeft:8,width:78}}>PLAYER</th>
            {cols.map(c=><th key={c} style={th}>{c}</th>)}</tr></thead>
          <tbody>{pl.map(([n,s],i)=>(<tr key={n} style={{background:i%2===0?"#fff":"#f6f3e8",borderTop:"1px solid #f0ece0"}}>
            <td style={nameTd}>{n}</td>
            {row(s).map((v,j)=>{const ob=v!==null&&typeof v==="object";
              return <td key={j} style={{...td,...(ob?{color:v.c,fontWeight:800,fontSize:10}:{})}}>{ob?v.v:v}</td>})}
          </tr>))}</tbody></table></div></div>);
  return(<div>
    <Tbl title="BATTING" cols={["GP","AB","H","R","RBI","HR","AVG","OBP","SLG"]}
      row={s=>{const{ab,avg,obp,slg}=statLine(s);return[s.G||0,ab,s.H||0,s.R||0,s.RBI||0,s.HR||0,
        {v:fmt3(avg,ab),c:"#1565C0"},{v:fmt3(obp,ab),c:"#FF6F00"},{v:fmt3(slg,ab),c:"#9C27B0"}]}}/>
    <Tbl title="BREAKDOWN" cols={["BB","1B","2B","3B","GO","SO","FO","FLO","SF","FC"]}
      row={s=>[s.BB||0,s["1B"]||0,s["2B"]||0,s["3B"]||0,s.GO||0,s.SO||0,s.FO||0,s.FLO||0,s.SF||0,s.FC||0]}/>
    <div style={{fontSize:10,color:"#8d7b5a",fontStyle:"italic",marginTop:-8}}>Both tables list players in the same order (sorted by batting average).</div>
  </div>);
}

// ─── Weekly MVP helpers ───
function weekStart(dateStr){
  let d=new Date(dateStr+"T00:00:00");
  if(isNaN(d))d=new Date(dateStr);
  if(isNaN(d))return dateStr;
  const day=(d.getDay()+6)%7; // Monday = 0
  d.setDate(d.getDate()-day);
  return d.toISOString().slice(0,10);
}
function weekLabel(ws){
  const d=new Date(ws+"T00:00:00");if(isNaN(d))return ws;
  const e=new Date(d);e.setDate(e.getDate()+6);
  const f=x=>x.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  return f(d)+" – "+f(e);
}
// Build per-game batting lines from local games (only ones flagged for awards)
function localGameLines(games){
  const lines=[];
  (games||[]).filter(g=>g.plays&&g.awardEligible!==false).forEach(g=>{
    const per={};
    const ensure=n=>{if(n&&!per[n])per[n]={player:n,date:g.date,AB:0,H:0,R:0,RBI:0,HR:0,"1B":0,"2B":0,"3B":0,BB:0};return per[n]};
    (g.lineup||[]).forEach(ensure);
    (g.plays||[]).forEach(p=>{const s=ensure(p.batter);if(!s)return;const o=p.outcome;
      if(!["BB","SF","FC"].includes(o))s.AB++;
      if(HITS.includes(o)){s.H++;s[o]++}
      if(o==="BB")s.BB++;
      s.RBI+=(p.rbi||0)});
    (g.plays||[]).forEach(p=>{(p.scoredPlayers||[]).forEach(n=>{const s=ensure(n);if(s)s.R++})});
    Object.values(per).forEach(s=>{if(s.AB>0||s.H>0||s.R>0||s.RBI>0||s.BB>0)lines.push(s)});
  });
  return lines;
}
// Build per-game lines from cloud per-player sheets
function cloudGameLines(playerGames){
  const lines=[];
  Object.entries(playerGames||{}).forEach(([name,rows])=>{
    (rows||[]).forEach(r=>lines.push({player:name,date:r.date,AB:r.AB||0,H:r.H||0,R:r.R||0,
      RBI:r.RBI||0,HR:r.HR||0,"1B":r["1B"]||0,"2B":r["2B"]||0,"3B":r["3B"]||0,BB:r.BB||0}));
  });
  return lines;
}
function weeklyMVPs(lines){
  const weeks={};
  (lines||[]).forEach(l=>{const ws=weekStart(l.date);
    if(!weeks[ws])weeks[ws]={};const w=weeks[ws];
    if(!w[l.player])w[l.player]={name:l.player,AB:0,H:0,R:0,RBI:0,HR:0,TB:0,BB:0,G:0};
    const s=w[l.player];
    s.AB+=l.AB||0;s.H+=l.H||0;s.R+=l.R||0;s.RBI+=l.RBI||0;s.HR+=l.HR||0;s.BB+=l.BB||0;s.G++;
    s.TB+=(l["1B"]||0)+(l["2B"]||0)*2+(l["3B"]||0)*3+(l.HR||0)*4});
  return Object.entries(weeks).map(([ws,players])=>{
    const scored=Object.values(players).filter(s=>s.AB>0).map(s=>{
      const avg=s.AB>0?s.H/s.AB:0;
      const score=(s.H*2)+(s.TB*1.5)+(s.RBI*2)+(s.R*1.5)+(s.HR*3)+(s.BB*0.5)+(avg*5);
      return{...s,avg,score}}).sort((a,b)=>b.score-a.score);
    return{weekStart:ws,mvp:scored[0]||null,players:scored};
  }).filter(w=>w.mvp).sort((a,b)=>a.weekStart<b.weekStart?1:-1);
}
function WeeklyMVPSection({lines,note}){
  const weeks=weeklyMVPs(lines);
  if(!weeks.length)return(<div style={{textAlign:"center",padding:40,color:"#b0a88a"}}>
    {note||"No games yet."}</div>);
  return(<div>
    {weeks.map(w=>{const m=w.mvp;return(<div key={w.weekStart} style={{marginBottom:16}}>
      <div style={{fontSize:11,fontWeight:800,color:"#8d7b5a",letterSpacing:1,marginBottom:6}}>WEEK OF {weekLabel(w.weekStart)}</div>
      <div style={{background:"linear-gradient(135deg,#1B5E20,#2E7D32)",borderRadius:16,padding:18,boxShadow:"0 6px 20px rgba(27,94,32,.25)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:34,lineHeight:1}}>🏆</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,color:"#A5D6A7",fontWeight:700,letterSpacing:1}}>WEEKLY MVP</div>
            <div style={{fontSize:22,fontWeight:900,color:"#FFD600",fontFamily:FM,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.name}</div></div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:20,fontWeight:900,color:"#fff",fontFamily:FM}}>{fmt3(m.avg,m.AB)}</div>
            <div style={{fontSize:9,color:"#A5D6A7"}}>AVG</div></div>
        </div>
        <div style={{display:"flex",gap:16,marginTop:12,flexWrap:"wrap"}}>
          {[["H-AB",m.H+"-"+m.AB],["R",m.R],["RBI",m.RBI],["HR",m.HR],["GP",m.G]].map(([l,v])=>
            <div key={l}><span style={{fontSize:15,fontWeight:800,color:"#fff",fontFamily:FM}}>{v}</span>
              <span style={{fontSize:9,color:"#A5D6A7",marginLeft:4}}>{l}</span></div>)}
        </div>
      </div>
      {w.players.length>1&&<div style={{marginTop:6,paddingLeft:2,fontSize:10,color:"#8d7b5a"}}>
        Runners-up: {w.players.slice(1,3).map(p=>`${p.name} (${fmt3(p.avg,p.AB)})`).join(", ")}</div>}
    </div>)})}
  </div>);
}

function StatsPage({games,onBack}){
  const [tab,setTab]=useState("stats");
  const [cloud,setCloud]=useState(null);
  const [cloudPG,setCloudPG]=useState(null);
  const [cloudGameCount,setCloudGameCount]=useState(0);
  const [loading,setLoading]=useState(false);
  const [source,setSource]=useState("local");

  // Try to fetch from Google Sheets on mount
  useEffect(()=>{
    const syncUrl=ld("sync_url","");
    if(!syncUrl)return;
    setLoading(true);
    fetch(syncUrl+"?action=stats").then(r=>r.json()).then(d=>{
      if(d.status==="ok"&&d.players&&Object.keys(d.players).length>0){
        setCloud(d.players);setSource("cloud");
        if(d.playerGames)setCloudPG(d.playerGames);
        // Total team games = count from game log
        if(d.games)setCloudGameCount(d.games.length);
        // Or use max G from any player as fallback
        else{const maxG=Math.max(...Object.values(d.players).map(p=>p.G||0),0);setCloudGameCount(maxG)}}
      setLoading(false)}).catch(()=>setLoading(false));
  },[]);

  // Use cloud data if available, otherwise local
  const c = source==="cloud"&&cloud ? cloud : aggStats(games);
  const pl=Object.entries(c).filter(([,s])=>(s.AB||0)>0||(s.G||0)>0).sort((a,b)=>((b[1].AB||0)>0?(b[1].H||0)/(b[1].AB||0):0)-((a[1].AB||0)>0?(a[1].H||0)/(a[1].AB||0):0));
  // Total games: use cloud count when viewing cloud data, local count otherwise
  const totalTeamGames=source==="cloud"&&cloudGameCount>0?cloudGameCount:games.filter(g=>g.plays).length;
  const MIN_G=Math.max(1,Math.ceil(totalTeamGames*MIN_PCT));
  const qualPl=pl.filter(([,s])=>(s.G||0)>=MIN_G);
  const unqPl=pl.filter(([,s])=>(s.G||0)<MIN_G&&(s.G||0)>0);
  const rc=[{l:"Batting Avg",f:s=>s.AB>0?s.H/s.AB:0,fm:v=>v.toFixed(3)},{l:"Slugging",f:s=>s.AB>0?(s["1B"]+s["2B"]*2+s["3B"]*3+s.HR*4)/s.AB:0,fm:v=>v.toFixed(3)},
    {l:"On-Base %",f:s=>(s.AB+s.BB+s.SF)>0?(s.H+s.BB)/(s.AB+s.BB+s.SF):0,fm:v=>v.toFixed(3)},
    {l:"Hits",f:s=>s.H},{l:"Runs",f:s=>s.R},{l:"RBI",f:s=>s.RBI},{l:"Home Runs",f:s=>s.HR},{l:"Doubles",f:s=>s["2B"]},{l:"Triples",f:s=>s["3B"]},
    {l:"Walks",f:s=>s.BB},{l:"Ground Outs",f:s=>s.GO},{l:"Strikeouts",f:s=>s.SO},{l:"Foul Outs",f:s=>s.FO},{l:"Fly Outs",f:s=>s.FLO}];
  const hd=["Player","Games","At Bats","Runs","Hits","Singles","Doubles","Triples","Home Runs","RBI","Walks","Ground Outs","Strikeouts","Foul Outs","Fly Outs","Sac Flies","Fielder's Choice","AVG","SLG","OBP"];
  return(<div style={{maxWidth:600,margin:"0 auto",padding:20}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <button onClick={onBack} style={{padding:"6px 14px",borderRadius:8,border:"2px solid #1B5E20",background:"transparent",color:"#1B5E20",fontSize:12,fontWeight:700,cursor:"pointer"}}>BACK</button>
      <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"#8d7b5a",fontWeight:600}}>SEASON</div>
        <div style={{fontSize:18,fontWeight:900,color:"#1B5E20",fontFamily:FM}}>{TEAM}</div></div></div>
    <div style={{display:"flex",gap:8,marginBottom:16}}>
      {["stats","weekly","rankings"].map(t=><button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:10,borderRadius:10,border:"none",cursor:"pointer",fontSize:11,
        background:tab===t?"#1B5E20":"#e8f5e9",color:tab===t?"#FFD600":"#1B5E20",fontWeight:700}}>{t==="stats"?"FULL STATS":t==="weekly"?"WEEKLY MVP":"RANKINGS"}</button>)}</div>
    {loading&&<div style={{textAlign:"center",padding:12,color:"#8d7b5a",fontSize:12}}>Loading stats from Google Sheets...</div>}
    {!loading&&cloud&&<div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:12}}>
      <button onClick={()=>setSource("cloud")} style={{padding:"4px 12px",borderRadius:6,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,
        background:source==="cloud"?"#4CAF50":"#e8f5e9",color:source==="cloud"?"#fff":"#4CAF50"}}>Google Sheets (Live)</button>
      <button onClick={()=>setSource("local")} style={{padding:"4px 12px",borderRadius:6,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,
        background:source==="local"?"#1B5E20":"#e8f5e9",color:source==="local"?"#FFD600":"#1B5E20"}}>Local (This Device)</button>
    </div>}
    {pl.length===0?<div style={{textAlign:"center",padding:40,color:"#b0a88a"}}>No games yet.</div>:
    tab==="stats"?<StatsTables pl={pl}/>:
    tab==="weekly"?(()=>{
      const cl=cloudPG?cloudGameLines(cloudPG):null;
      const ll=localGameLines(games);
      const lines=(cl&&cl.length)?cl:ll;
      const note=(!lines.length&&cloud&&!cloudPG)
        ?"Weekly MVPs read game-by-game data from your Google Sheet, which needs the updated Apps Script. Redeploy it (Manage deployments → ✏️ → New version) and this will fill in."
        :undefined;
      return <WeeklyMVPSection lines={lines} note={note}/>})():
    <div>
      <div style={{textAlign:"center",fontSize:11,color:"#8d7b5a",marginBottom:12,fontStyle:"italic"}}>Min. {MIN_G} of {totalTeamGames} games (40%) to qualify</div>
      {qualPl.length===0?<div style={{textAlign:"center",padding:30,color:"#b0a88a",fontSize:13}}>No players have reached {MIN_G} games yet.</div>:
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

// ─── Play-by-play (used live during a game and in the game breakdown) ───
function playDetail(p){
  const parts=[];
  if((p.rbi||0)>0)parts.push(`${p.rbi} RBI`);
  const sc=p.scoredPlayers||[];
  if(sc.length)parts.push(`${sc.join(", ")} scored`);
  if(p.fcInfo&&p.fcInfo.player)parts.push(`${p.fcInfo.player} out at ${p.fcInfo.base}`);
  if((p.extraOuts||0)>0)parts.push(`${p.extraOuts} out on the bases`);
  return parts.join(" • ");
}
function PlayRow({p}){
  const detail=playDetail(p);const scored=(p.scoredPlayers||[]).length>0;
  return(<div style={{display:"flex",gap:10,alignItems:"flex-start",padding:"8px 0",borderBottom:"1px solid #f2eee2"}}>
    <span style={{flexShrink:0,minWidth:34,textAlign:"center",padding:"3px 5px",borderRadius:7,background:OC[p.outcome]||"#9E9E9E",color:"#fff",fontWeight:800,fontSize:11,fontFamily:FM}}>{p.outcome}</span>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:13,fontWeight:700,color:"#1B5E20"}}>{p.batter} <span style={{fontWeight:500,color:"#8d7b5a",fontSize:11}}>{OL[p.outcome]||p.outcome}</span></div>
      {detail&&<div style={{fontSize:11,color:scored?"#2E7D32":"#8d7b5a",marginTop:1,fontWeight:scored?700:400}}>{detail}</div>}
    </div>
  </div>);
}
function PlayByPlay({plays,ourS,oppS,reverse}){
  const inns=new Set();
  (plays||[]).forEach(p=>inns.add(p.inning));
  Object.keys(ourS||{}).forEach(k=>inns.add(+k));
  Object.keys(oppS||{}).forEach(k=>inns.add(+k));
  let list=[...inns].filter(n=>n>=1).sort((a,b)=>a-b);
  if(reverse)list=list.reverse();
  if(!list.length)return(<div style={{textAlign:"center",padding:24,color:"#b0a88a",fontSize:13}}>No plays yet — they'll show up here as you score.</div>);
  return(<div>
    {list.map(n=>{
      let ip=(plays||[]).filter(p=>p.inning===n);
      if(reverse)ip=[...ip].reverse();
      const our=(ourS||{})[n]||0,opp=(oppS||{})[n]||0;
      return(<div key={n} style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,padding:"0 2px"}}>
          <span style={{fontSize:12,fontWeight:800,color:"#8d7b5a",letterSpacing:1}}>INNING {n}</span>
          <span style={{fontSize:11,fontWeight:700,color:"#1B5E20"}}>{TEAM} {our} · {opp} OPP</span></div>
        <div style={{background:"#fff",borderRadius:12,border:"1px solid #e0dcc8",padding:"4px 12px"}}>
          {ip.length===0&&<div style={{padding:"8px 0",fontSize:12,color:"#b0a88a"}}>No at-bats recorded.</div>}
          {ip.map((p,i)=><PlayRow key={i} p={p}/>)}
          {opp>0&&<div style={{padding:"8px 0 4px",fontSize:12,fontWeight:700,color:"#F44336"}}>Opponent scored {opp} run{opp!==1?"s":""}</div>}
        </div>
      </div>);
    })}
  </div>);
}

function GameDetail({game,onBack}){
  const plays=game.plays||[];const stats={};
  (game.lineup||[]).forEach(n=>{stats[n]={AB:0,R:0,H:0,"1B":0,"2B":0,"3B":0,HR:0,RBI:0,BB:0}});
  plays.forEach(p=>{const s=stats[p.batter];if(!s)return;if(!["BB","SF","FC"].includes(p.outcome))s.AB++;if(HITS.includes(p.outcome)){s.H++;s[p.outcome]++}if(p.outcome==="BB")s.BB++;s.RBI+=(p.rbi||0)});
  plays.forEach(p=>{(p.scoredPlayers||[]).forEach(n=>{if(stats[n])stats[n].R++})});
  const ourR=Object.values(game.ourScoreByInning||{}).reduce((a,b)=>a+b,0);
  const oppR=Object.values(game.oppScoreByInning||{}).reduce((a,b)=>a+b,0);
  return(<div style={{maxWidth:520,margin:"0 auto",padding:20}}>
    <button onClick={onBack} style={{padding:"6px 14px",borderRadius:8,border:"2px solid #1B5E20",background:"transparent",color:"#1B5E20",fontSize:12,fontWeight:700,cursor:"pointer",marginBottom:16}}>BACK</button>
    <div style={{textAlign:"center",marginBottom:16}}>
      <div style={{fontSize:20,fontWeight:900,color:"#1B5E20",fontFamily:FM}}>{TEAM} {ourR} — {oppR} {game.opponent||"OPP"}</div>
      <div style={{fontSize:12,color:"#8d7b5a",marginTop:4}}>{game.date}{game.field?` • ${game.field}`:""}</div></div>
    <Scoreboard opp={game.opponent} ourS={game.ourScoreByInning} oppS={game.oppScoreByInning} isHome={game.isHome}/>
    <div style={{overflowX:"auto",borderRadius:12,border:"1px solid #e0dcc8",marginTop:16}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:FM}}>
        <thead><tr style={{background:"#1B5E20"}}>{["PLAYER","AB","R","H","1B","2B","3B","HR","RBI","BB","AVG"].map(h=>
          <th key={h} style={{padding:"7px 4px",color:"#FFD600",fontWeight:700,fontSize:9}}>{h}</th>)}</tr></thead>
        <tbody>{(game.lineup||[]).map((n,i)=>{const s=stats[n]||{AB:0,R:0,H:0,"1B":0,"2B":0,"3B":0,HR:0,RBI:0,BB:0};
          const avg=s.AB>0?(s.H/s.AB).toFixed(3):"-";
          return(<tr key={n} style={{background:i%2===0?"#faf8f2":"#fff"}}>
            <td style={{padding:"5px 8px",fontWeight:600,color:"#1B5E20",whiteSpace:"nowrap"}}>{n}</td>
            {[s.AB,s.R,s.H,s["1B"],s["2B"],s["3B"],s.HR,s.RBI,s.BB].map((v,j)=>
              <td key={j} style={{padding:"5px 3px",textAlign:"center",color:"#333"}}>{v}</td>)}
            <td style={{padding:"5px 3px",textAlign:"center",fontWeight:700,color:"#1565C0"}}>{avg}</td></tr>)})}</tbody></table></div>
    <div style={{marginTop:22}}>
      <div style={{fontSize:13,fontWeight:800,color:"#1B5E20",letterSpacing:1,marginBottom:10}}>PLAY-BY-PLAY</div>
      <PlayByPlay plays={plays} ourS={game.ourScoreByInning} oppS={game.oppScoreByInning}/>
    </div>
  </div>);
}

  const un=games.filter(g=>!g.synced);useEffect(()=>{if(url)sv("sync_url",url)},[url]);
  const doSync=async()=>{if(!url.trim()){setStatus("Paste your Apps Script URL above.");return}if(!un.length){setStatus("All synced!");return}
    setBusy(true);setStatus("Syncing "+un.length+" game(s)...");
    try{const r=await fetch(url.trim(),{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"sync_all",games:un})});
      const d=await r.json();if(d.status==="ok"){setStatus("✓ Synced "+un.length+" game(s)!");onSynced(un.map(g=>g.id))}
      else setStatus("Error: "+(d.message||"Unknown"))}catch(e){setStatus("Failed: "+e.message)}setBusy(false)};
  const doTest=async()=>{if(!url.trim()){setStatus("Paste URL first.");return}setBusy(true);setStatus("Testing...");
    try{const r=await fetch(url.trim());const d=await r.json();setStatus(d.status==="ok"?"✓ Connected!":"Unexpected: "+JSON.stringify(d))}
    catch(e){setStatus("Failed: "+e.message)}setBusy(false)};
  const saveSheet=()=>{setSheetLink(localSheet);sv("sheet_link",localSheet);setStatus("✓ Sheet link saved!")};
  const withPlays=games.filter(g=>g.plays&&g.plays.length);
  const doBackfill=async()=>{if(!url.trim()){setStatus("Paste your Apps Script URL above.");return}
    if(!withPlays.length){setStatus("No play-by-play to upload yet.");return}
    setBusy(true);setStatus("Uploading play-by-play...");
    try{const r=await fetch(url.trim(),{method:"POST",headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"sync_plays",games:withPlays.map(g=>({id:g.id,date:g.date,opponent:g.opponent,gameNum:g.gameNum,plays:g.plays}))})});
      const d=await r.json();
      if(d.status==="ok"){
        if((d.updated||0)>0)setStatus("✓ Play-by-play uploaded for "+d.updated+" game(s)! Teammates can now see it.");
        else if((d.rows||0)===0)setStatus("The Sheet has no games in its GAME LOG yet. Sync your games first, then run this again.");
        else setStatus("Sent "+(d.received||0)+" game(s) but none matched the "+(d.rows||0)+" row(s) in GAME LOG.\nMost likely fix: in Apps Script, use Deploy → Manage deployments → ✏️ → New version → Deploy, then try again.");
      }else if((d.message||"").toLowerCase().includes("unknown action"))
        setStatus("Your Google Apps Script is still running the OLD code.\nFix: paste the new script, then Deploy → Manage deployments → ✏️ edit → Version: New version → Deploy. (A brand-new deployment creates a different URL — edit the existing one instead.)");
      else setStatus("Error: "+(d.message||"Unknown"))}catch(e){setStatus("Failed: "+e.message)}setBusy(false)};
  return(<div style={{maxWidth:480,margin:"0 auto",padding:20}}>
    <button onClick={onBack} style={{padding:"6px 14px",borderRadius:8,border:"2px solid #1B5E20",background:"transparent",color:"#1B5E20",fontSize:12,fontWeight:700,cursor:"pointer",marginBottom:16}}>BACK</button>
    <div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:22,fontWeight:900,color:"#1B5E20",fontFamily:FM}}>SYNC SETTINGS</div></div>

    {/* Google Sheet Link */}
    <div style={{background:"#faf8f2",borderRadius:16,padding:20,border:"1px solid #e0dcc8",marginBottom:16}}>
      <div style={{fontSize:12,fontWeight:700,color:"#4CAF50",letterSpacing:1,marginBottom:10}}>GOOGLE SHEET LINK</div>
      <div style={{fontSize:11,color:"#8d7b5a",marginBottom:8}}>Paste your Google Sheet URL here. This gets included when you share the roster link with teammates.</div>
      <input value={localSheet} onChange={e=>setLocalSheet(e.target.value)} placeholder="https://docs.google.com/spreadsheets/d/..."
        style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"2px solid #e0dcc8",fontSize:11,fontFamily:FM,background:"#fff",outline:"none",boxSizing:"border-box"}}/>
      <button onClick={saveSheet} style={{width:"100%",padding:12,borderRadius:10,border:"none",background:"#4CAF50",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",marginTop:8}}>
        SAVE SHEET LINK</button>

      <div style={{fontSize:11,color:"#8d7b5a",marginBottom:10}}>Games sync automatically when saved (and retry on their own if you're offline). The button below is just a manual backup.</div>
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12}}>
        <div style={{width:14,height:14,borderRadius:"50%",background:un.length?"#FF9800":"#4CAF50",flexShrink:0}}/>

// ─── Outcome Modal ───
function OutModal({batter,outcome,onOk,onNo,bases}){
  const isHR=outcome==="HR",isFC=outcome==="FC",isSF=outcome==="SF";
  const isGO=outcome==="GO",isFLO=outcome==="FLO";
  const isOut=OUTS.includes(outcome);
  const reachBase=HITS.includes(outcome)||outcome==="BB"||isFC;
  const rl=[];
  if(bases.third)rl.push({name:bases.third,from:"3rd"});
  if(bases.second)rl.push({name:bases.second,from:"2nd"});
  if(bases.first)rl.push({name:bases.first,from:"1st"});
  const hasR=rl.length>0;

  // GO/FLO/SF with runners: need to ask about runner advancement
  const outWithRunners=(isGO||isFLO||isSF)&&hasR;

  const getDef=()=>{const d={};
    if(isHR){rl.forEach(r=>d[r.name]="scored");d[batter]="scored";return d}
    rl.forEach(r=>{
      if(outcome==="1B"||outcome==="BB"){d[r.name]=r.from==="3rd"?"scored":r.from==="2nd"?"3rd":"2nd"}
      else if(outcome==="2B"){d[r.name]=(r.from==="3rd"||r.from==="2nd")?"scored":"3rd"}
      else if(outcome==="3B"){d[r.name]="scored"}
      else if(isSF){d[r.name]=r.from==="3rd"?"scored":"stay"}
      else if(isFLO){d[r.name]="stay"}// fly out: runners stay unless tagged up
      else if(isGO){d[r.name]="stay"}// ground out: runners stay unless forced
      else if(isFC){d[r.name]=r.from==="3rd"?"scored":r.from==="2nd"?"3rd":"2nd"}
      else{d[r.name]="stay"}});return d};
  const [adv,setAdv]=useState(getDef);
  const [fcPlayer,setFcPlayer]=useState(rl.length?rl[rl.length-1].name:"");
  const [fcBase,setFcBase]=useState(rl.length?rl[rl.length-1].from:"1st");
  const setRA=(n,v)=>setAdv(p=>({...p,[n]:v}));
  const getOpts=(f,allowOut)=>{const o=[{v:"stay",l:"Stay"}];
    if(f==="1st")o.push({v:"2nd",l:"→ 2nd"},{v:"3rd",l:"→ 3rd"},{v:"scored",l:"→ Scored"});
    if(f==="2nd")o.push({v:"3rd",l:"→ 3rd"},{v:"scored",l:"→ Scored"});
    if(f==="3rd")o.push({v:"scored",l:"→ Scored"});
    if(allowOut)o.push({v:"out",l:"OUT"});
    return o};
  const sp=Object.entries(adv).filter(([,v])=>v==="scored").map(([n])=>n);
  const outsOnPlay=Object.entries(adv).filter(([,v])=>v==="out").map(([n])=>n);
  const showRunners=((reachBase||outWithRunners)&&hasR)||isHR;

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#faf8f2",borderRadius:20,padding:24,maxWidth:400,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.3)",maxHeight:"92vh",overflowY:"auto"}}>
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:13,color:"#8d7b5a",fontWeight:600}}>{batter}</div>
          <div style={{display:"inline-block",marginTop:6,padding:"5px 16px",borderRadius:20,background:OC[outcome],color:"#fff",fontWeight:800,fontSize:15,fontFamily:FM}}>
            {OL[outcome]}</div></div>

        {/* FC: pick which player got out and at which base */}
        {isFC&&hasR&&<div style={{marginBottom:14}}>
          <label style={{fontSize:11,fontWeight:700,color:"#1B5E20"}}>WHICH RUNNER GOT OUT?</label>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:6}}>
            {rl.map(r=><button key={r.name} onClick={()=>{setFcPlayer(r.name);setFcBase(r.from)}}
              style={{padding:"10px 14px",borderRadius:10,border:"none",cursor:"pointer",display:"flex",justifyContent:"space-between",
                background:fcPlayer===r.name?"#795548":"#efebe9",color:fcPlayer===r.name?"#fff":"#795548",fontWeight:700,fontSize:13,fontFamily:FM}}>
              <span>{r.name}</span><span>on {r.from}</span></button>)}</div>
          {fcPlayer&&<div style={{marginTop:8}}>
            <label style={{fontSize:11,fontWeight:700,color:"#1B5E20"}}>OUT AT WHICH BASE?</label>
            <div style={{display:"flex",gap:6,marginTop:6}}>
              {["1st","2nd","3rd","Home"].map(b=><button key={b} onClick={()=>setFcBase(b)} style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",
                background:fcBase===b?"#795548":"#efebe9",color:fcBase===b?"#fff":"#795548",fontWeight:700,fontSize:12}}>{b}</button>)}</div></div>}
        </div>}
        {isFC&&!hasR&&<div style={{marginBottom:14}}>
          <label style={{fontSize:11,fontWeight:700,color:"#1B5E20"}}>OUT AT WHICH BASE?</label>
          <div style={{display:"flex",gap:6,marginTop:6}}>
            {["1st","2nd","3rd","Home"].map(b=><button key={b} onClick={()=>setFcBase(b)} style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",
              background:fcBase===b?"#795548":"#efebe9",color:fcBase===b?"#fff":"#795548",fontWeight:700,fontSize:12}}>{b}</button>)}</div></div>}

        {/* HR: auto score everyone */}
        {isHR&&<div style={{marginBottom:14}}>
          <label style={{fontSize:11,fontWeight:700,color:"#1B5E20"}}>EVERYONE SCORES</label>
          <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:6}}>
            {[...rl.map(r=>r.name),batter].map(n=>
              <div key={n} style={{padding:"8px 14px",borderRadius:8,background:"#1B5E20",color:"#FFD600",fontWeight:700,fontSize:13,fontFamily:FM,display:"flex",justifyContent:"space-between"}}>
                <span>{n}</span><span>✓ SCORED</span></div>)}</div></div>}

        {/* Runners section for hits, BB, FC, GO, FLO, SF */}
        {showRunners&&!isHR&&<div style={{marginBottom:14}}>
          <label style={{fontSize:11,fontWeight:700,color:"#1B5E20",letterSpacing:1}}>
            {outWithRunners?"RUNNERS (tag up? double play?)":"RUNNERS"}</label>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:8}}>
            {rl.map(r=>{
              if(isFC&&r.name===fcPlayer)return null;// FC out player already handled
              const allowOut=true;// runners can get out on any play (thrown out advancing, double play, etc)
              const opts=getOpts(r.from,allowOut);const cur=adv[r.name]||"stay";
              return(<div key={r.name} style={{background:"#fff",borderRadius:10,padding:12,border:"1px solid #e0dcc8"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#1B5E20",marginBottom:6}}>{r.name} <span style={{fontWeight:400,color:"#8d7b5a"}}>(on {r.from})</span></div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {opts.map(o=><button key={o.v} onClick={()=>setRA(r.name,o.v)}
                    style={{padding:"6px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:FM,
                      background:cur===o.v?(o.v==="scored"?"#1B5E20":o.v==="out"?"#F44336":"#FF9800"):"#e8f5e9",
                      color:cur===o.v?"#fff":"#1B5E20"}}>{o.l}</button>)}</div></div>)})}
          </div>
          {sp.length>0&&<div style={{marginTop:8,textAlign:"center",fontSize:13,fontWeight:800,color:"#1B5E20"}}>{sp.length} run{sp.length!==1?"s":""} scored</div>}
          {outsOnPlay.length>0&&<div style={{marginTop:4,textAlign:"center",fontSize:12,fontWeight:700,color:"#F44336"}}>{outsOnPlay.join(", ")} thrown out on the bases</div>}
        </div>}

        <div style={{display:"flex",gap:10,marginTop:4}}>
          <button onClick={onNo} style={{flex:1,padding:12,borderRadius:10,border:"2px solid #c8a96e",background:"transparent",color:"#8d7b5a",fontWeight:700,fontSize:13,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>{const fs=isHR?[...rl.map(r=>r.name),batter]:sp;
            const rbi=isHR?rl.length+1:isSF?sp.length:sp.filter(n=>n!==batter).length;
            const fcInfo=isFC?{player:fcPlayer,base:fcBase}:null;
            onOk(rbi,fs.includes(batter)?1:0,fs,fcInfo,adv,outsOnPlay.length)}}
            style={{flex:2,padding:12,borderRadius:10,border:"none",background:"#1B5E20",color:"#FFD600",fontWeight:800,fontSize:13,cursor:"pointer"}}>Confirm</button>
        </div></div></div>);
}

          background:sc===n?"#F44336":"#fce4ec",color:sc===n?"#fff":"#F44336",fontWeight:800,fontSize:14,fontFamily:FM}}>{n}</button>)}</div>

// ─── Daily Awards (MVP of the day) ───
function DailyAwards({games,date,onDone}){
  // Get all award-eligible games from this date
  const todayGames=games.filter(g=>g.date===date&&g.plays&&g.awardEligible!==false);
  if(todayGames.length<2)return(<div style={{maxWidth:480,margin:"0 auto",padding:20,textAlign:"center"}}>
    <div style={{fontSize:14,color:"#8d7b5a",marginBottom:16}}>Play your 2nd game tonight to see the daily MVP!</div>
    <button onClick={onDone} style={{padding:"12px 24px",borderRadius:10,border:"none",background:"#1B5E20",color:"#FFD600",fontWeight:800,fontSize:14,cursor:"pointer"}}>CONTINUE</button>
  </div>);

  // Aggregate stats across today's games
  const dayStats={};
  todayGames.forEach(g=>{
    (g.plays||[]).forEach(p=>{
      const n=p.batter,o=p.outcome;
      if(!dayStats[n])dayStats[n]={AB:0,H:0,R:0,RBI:0,HR:0,"2B":0,"3B":0,TB:0,BB:0};
      const s=dayStats[n];
      if(!["BB","SF","FC"].includes(o))s.AB++;
      if(HITS.includes(o)){s.H++;
        if(o==="1B")s.TB+=1;if(o==="2B"){s.TB+=2;s["2B"]++}if(o==="3B"){s.TB+=3;s["3B"]++}if(o==="HR"){s.TB+=4;s.HR++}}
      if(o==="BB")s.BB++;
      s.RBI+=(p.rbi||0);
    });
    (g.plays||[]).forEach(p=>{(p.scoredPlayers||[]).forEach(n=>{if(dayStats[n])dayStats[n].R++})});
  });

  // Score each player: weighted formula
  // Hits matter, extra base hits matter more, RBI/R matter, AVG matters
  const scored=Object.entries(dayStats).filter(([,s])=>s.AB>0).map(([name,s])=>{
    const avg=s.AB>0?s.H/s.AB:0;
    const score=(s.H*2)+(s.TB*1.5)+(s.RBI*2)+(s.R*1.5)+(s.HR*3)+(s.BB*0.5)+(avg*5);
    return{name,s,avg,score};
  }).sort((a,b)=>b.score-a.score);

  if(scored.length<1)return(<div style={{maxWidth:480,margin:"0 auto",padding:20,textAlign:"center"}}>
    <button onClick={onDone} style={{padding:"12px 24px",borderRadius:10,border:"none",background:"#1B5E20",color:"#FFD600",fontWeight:800,fontSize:14,cursor:"pointer"}}>CONTINUE</button>
  </div>);

  const mvp=scored[0];

  return(<div style={{maxWidth:480,margin:"0 auto",padding:20}}>
    <div style={{textAlign:"center",marginBottom:20}}>
      <div style={{fontSize:12,color:"#8d7b5a",fontWeight:600,letterSpacing:2}}>GAME NIGHT AWARDS</div>
      <div style={{fontSize:11,color:"#8d7b5a",marginTop:4}}>{date}</div>
    </div>

    {/* MVP */}
    <div style={{background:"linear-gradient(135deg,#1B5E20,#2E7D32)",borderRadius:16,padding:24,marginBottom:16,textAlign:"center",boxShadow:"0 8px 32px rgba(27,94,32,.3)"}}>
      <div style={{fontSize:36,marginBottom:4}}>🏆</div>
      <div style={{fontSize:12,color:"#A5D6A7",fontWeight:600,letterSpacing:2}}>MVP OF THE DAY</div>
      <div style={{fontSize:28,fontWeight:900,color:"#FFD600",fontFamily:FM,marginTop:8}}>{mvp.name}</div>
      <div style={{display:"flex",justifyContent:"center",gap:16,marginTop:12}}>
        <div><div style={{fontSize:18,fontWeight:800,color:"#fff",fontFamily:FM}}>{mvp.s.H}-{mvp.s.AB}</div>
          <div style={{fontSize:9,color:"#A5D6A7"}}>H-AB</div></div>
        <div><div style={{fontSize:18,fontWeight:800,color:"#fff",fontFamily:FM}}>{mvp.avg.toFixed(3)}</div>
          <div style={{fontSize:9,color:"#A5D6A7"}}>AVG</div></div>
        <div><div style={{fontSize:18,fontWeight:800,color:"#fff",fontFamily:FM}}>{mvp.s.RBI}</div>
          <div style={{fontSize:9,color:"#A5D6A7"}}>RBI</div></div>
        <div><div style={{fontSize:18,fontWeight:800,color:"#fff",fontFamily:FM}}>{mvp.s.R}</div>
          <div style={{fontSize:9,color:"#A5D6A7"}}>R</div></div>
        {mvp.s.HR>0&&<div><div style={{fontSize:18,fontWeight:800,color:"#fff",fontFamily:FM}}>{mvp.s.HR}</div>
          <div style={{fontSize:9,color:"#A5D6A7"}}>HR</div></div>}
      </div>
    </div>

    <button onClick={onDone} style={{width:"100%",padding:16,borderRadius:14,border:"none",background:"#1B5E20",color:"#FFD600",fontWeight:900,fontSize:16,cursor:"pointer",fontFamily:FM,boxShadow:"0 6px 24px rgba(27,94,32,.3)"}}>DONE</button>
  </div>);
}

function Summary({gd,plays,ourS,oppS,onSave}){
  const stats={};(gd.lineup||[]).forEach(n=>{stats[n]={AB:0,R:0,H:0,"1B":0,"2B":0,"3B":0,HR:0,RBI:0,BB:0}});
  plays.forEach(p=>{const s=stats[p.batter];if(!s)return;if(!["BB","SF","FC"].includes(p.outcome))s.AB++;
    if(HITS.includes(p.outcome)){s.H++;s[p.outcome]++}if(p.outcome==="BB")s.BB++;s.RBI+=(p.rbi||0);
    (p.scoredPlayers||[]).forEach(n=>{if(stats[n])stats[n].R++})});
  const oT=Object.values(ourS).reduce((a,b)=>a+b,0),opT=Object.values(oppS).reduce((a,b)=>a+b,0);
  const w=oT>opT,t=oT===opT;

  </div>);
}

// ═══ MAIN APP ═══
function App(){
  // Check if this is a read-only stats view link

  const [scr,setScr]=useState(savedActive?(savedActive.scr||"scoring"):"setup");const [gd,setGd]=useState(savedActive?savedActive.gd:null);const [plays,setPlays]=useState(savedActive?savedActive.plays:[]);
  const [inn,setInn]=useState(savedActive?savedActive.inn:1);const [outs,setOuts]=useState(savedActive?savedActive.outs:0);const [batIdx,setBatIdx]=useState(savedActive?savedActive.batIdx:0);

      const r=params.get("roster");
      if(r){const decoded=JSON.parse(decodeURIComponent(r));
        if(Array.isArray(decoded)&&decoded.length>0){
          // Merge with existing roster (don't lose players)
          const existing=ld("roster",[]);
          const merged=[...new Set([...existing,...decoded])];
          sv("roster",merged);
          // Also grab sheet link if included
          const sh=params.get("sheet");
          if(sh){sv("sheet_link",sh)}
          // Also grab sync URL if included
          const sy=params.get("sync");

    return ld("roster",[])});

  const [opp,setOpp]=useState("");const [gNum,setGNum]=useState("");const [gDate,setGDate]=useState(new Date().toISOString().slice(0,10));
  const [field,setField]=useState("");const [isHome,setIsHome]=useState(true);const [newP,setNewP]=useState("");
  const [dragI,setDragI]=useState(null);const [rmConf,setRmConf]=useState(null);
  const [skipConf,setSkipConf]=useState(null);const [waitOpp,setWaitOpp]=useState(savedActive?!!savedActive.waitOpp:false);
  const [showPbP,setShowPbP]=useState(true);
  const [addLate,setAddLate]=useState(false);const [lateP,setLateP]=useState("");
  const [awardDate,setAwardDate]=useState(null);
  const [showShare,setShowShare]=useState(false);
  const [copied,setCopied]=useState(false);
  const [sheetLink,setSheetLink]=useState(()=>ld("sheet_link",""));

  const shareUrl=()=>{const base=window.location.origin+window.location.pathname;
    let u=base+"?roster="+encodeURIComponent(JSON.stringify(roster));
    if(sheetLink)u+="&sheet="+encodeURIComponent(sheetLink);
    const syncU=ld("sync_url","");
    if(syncU)u+="&sync="+encodeURIComponent(syncU);

  // View-only stats link with the sync URL baked in, so teammates need no prior setup
  const statsShareUrl=()=>window.location.origin+window.location.pathname+"?view=stats&sync="+encodeURIComponent(ld("sync_url",""));
  const copyShare=()=>{navigator.clipboard.writeText(shareUrl()).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000)}).catch(()=>{
    // Fallback for older browsers
    const ta=document.createElement("textarea");ta.value=shareUrl();document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    setCopied(true);setTimeout(()=>setCopied(false),2000)})};

  useEffect(()=>{sv("games",games)},[games]);
  useEffect(()=>{sv("roster",roster)},[roster]);
  // ── Cloud roster sync ──
  // The Google Sheet is the source of truth. Pull it on load (so a scorer you
  // send the link to already has everyone), and push on every add/delete.
  const rosterReady=useRef(false);
  const lastRosterSynced=useRef(null);
  const pushRoster=(list)=>{
    const syncUrl=ld("sync_url","");
    if(!syncUrl)return;
    const j=JSON.stringify(list);
    if(lastRosterSynced.current===j)return; // nothing changed
    lastRosterSynced.current=j;
    fetch(syncUrl,{method:"POST",headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"save_roster",roster:list})}).catch(()=>{});
  };
  useEffect(()=>{
    const syncUrl=ld("sync_url","");
    if(!syncUrl){rosterReady.current=true;return;}
    fetch(syncUrl+"?action=roster").then(r=>r.json()).then(d=>{
      if(d&&d.status==="ok"){
        if(d.rosterInitialized){
          const cloud=Array.isArray(d.roster)?d.roster:[];
          lastRosterSynced.current=JSON.stringify(cloud);
          setRoster(cloud); // cloud wins, so deletions propagate
        }else{
          pushRoster(roster); // sheet not set up yet — seed it from this device
        }
      }
    }).catch(()=>{}).finally(()=>{rosterReady.current=true});
  },[]);
  useEffect(()=>{
    if(!rosterReady.current)return; // don't echo the initial cloud pull back up
    pushRoster(roster);
  },[roster]);
  // ── Background auto-sync of games ──
  // Whenever there are unsynced games, push them automatically: right after a

  const syncBusy=useRef(false);

    const url=ld("sync_url","");if(!url)return;
    if(syncBusy.current)return;
    const un=gamesRef.current.filter(g=>!g.synced);if(!un.length)return;
    syncBusy.current=true;
    try{
      const r=await fetch(url,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"sync_all",games:un})});
      const d=await r.json();
      if(d.status==="ok"){const ids=un.map(g=>g.id);setGames(p=>p.map(g=>ids.includes(g.id)?{...g,synced:true}:g))}
    }catch(e){/* offline or backend down — the timer/online listener will retry */}

    // Clear out players marked as out (double play)
    if(adv){Object.entries(adv).forEach(([name,dest])=>{if(dest==="out"){if(nb.first===name)nb.first=null;if(nb.second===name)nb.second=null;if(nb.third===name)nb.third=null}})}
    // Clear FC out player from bases

      {waitOpp&&<div style={{background:"#FFF3E0",borderRadius:12,padding:16,marginTop:12,border:"2px solid #FF9800",textAlign:"center"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#E65100",marginBottom:8}}>Waiting for {gd.opponent||"opponent"} to bat...</div>
        <button onClick={()=>setOppAsk(inn)} style={{padding:"12px 24px",borderRadius:10,border:"none",background:"#FF9800",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer"}}>THEIR INNING IS OVER</button>
      </div>}

      {hist.length>0&&<div style={{textAlign:"center",marginTop:12}}>
        <button onClick={undo} style={{padding:"6px 16px",borderRadius:8,border:"1px solid #F44336",background:"transparent",color:"#F44336",fontSize:11,fontWeight:700,cursor:"pointer"}}>UNDO LAST</button></div>}

      {modal&&<OutModal batter={modal.batter} outcome={modal.outcome} bases={bases} onOk={doPlay} onNo={()=>setModal(null)}/>}
      {oppAsk!==null&&<OppModal inning={oppAsk} onOk={doOpp}/>}

      {skipConf&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:"#faf8f2",borderRadius:16,padding:24,maxWidth:340,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
          <div style={{fontSize:16,fontWeight:700,color:"#1B5E20",marginBottom:8}}>Remove {skipConf}?</div>
          <div style={{fontSize:12,color:"#8d7b5a",marginBottom:16}}>They'll be removed from the lineup for the rest of this game.</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setSkipConf(null)} style={{flex:1,padding:12,borderRadius:10,border:"2px solid #c8a96e",background:"transparent",color:"#8d7b5a",fontWeight:700,cursor:"pointer"}}>Cancel</button>
            <button onClick={()=>{const newLu=gd.lineup.filter(n=>n!==skipConf);if(!newLu.length){setSkipConf(null);return}
              const nb={...bases};if(nb.first===skipConf)nb.first=null;if(nb.second===skipConf)nb.second=null;if(nb.third===skipConf)nb.third=null;
              setBases(nb);setGd({...gd,lineup:newLu});if(batIdx>=newLu.length)setBatIdx(batIdx%newLu.length);setSkipConf(null)}}
              style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#F44336",color:"#fff",fontWeight:700,cursor:"pointer"}}>Remove</button></div></div></div>}

      {/* Mid-game lineup manager */}
      {addLate&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:"#faf8f2",borderRadius:16,padding:20,maxWidth:380,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.3)",maxHeight:"90vh",overflowY:"auto"}}>
          <div style={{fontSize:16,fontWeight:700,color:"#1B5E20",marginBottom:4}}>Edit Lineup</div>
          <div style={{fontSize:11,color:"#8d7b5a",marginBottom:12}}>Drag to reorder • × to remove • add from roster or type a new name</div>

          {/* Draggable lineup */}
          {gd.lineup.map((n,i)=>(
            <div key={n} draggable
              onDragStart={()=>setDragI(i)} onDragOver={e=>e.preventDefault()}
              onDrop={()=>{if(dragI!==null&&dragI!==i){const a=[...gd.lineup];const[it]=a.splice(dragI,1);a.splice(i,0,it);setGd({...gd,lineup:a});setDragI(null)}}}
              onDragEnd={()=>setDragI(null)}
              onTouchStart={()=>setDragI(i)}
              style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",
                background:dragI===i?"#C8E6C9":(i%2===0?"#fff":"#f8f6f0"),
                borderRadius:8,marginBottom:3,cursor:"grab",border:"1px solid #e8e4d4",transition:"background .2s"}}>
              <span style={{fontSize:10,color:"#8d7b5a",cursor:"grab",userSelect:"none"}}>☰</span>
              <span style={{fontSize:13,fontWeight:800,color:"#1B5E20",fontFamily:FM,width:22,textAlign:"center"}}>{i+1}</span>
              <span style={{fontSize:13,fontWeight:600,color:"#333",flex:1}}>{n}</span>
              {n===curBat&&<span style={{fontSize:9,color:"#FF9800",fontWeight:700}}>AT BAT</span>}
              <button onClick={()=>{
                const newLu=gd.lineup.filter(x=>x!==n);
                if(!newLu.length)return;
                const nb={...bases};if(nb.first===n)nb.first=null;if(nb.second===n)nb.second=null;if(nb.third===n)nb.third=null;
                setBases(nb);setGd({...gd,lineup:newLu});
                if(batIdx>=newLu.length)setBatIdx(batIdx%newLu.length);
              }} style={{background:"none",border:"none",color:"#F44336",cursor:"pointer",fontSize:16,lineHeight:1,padding:"0 2px"}}>×</button>
            </div>
          ))}

          {/* Roster players not in lineup */}
          {roster.filter(n=>!gd.lineup.includes(n)).length>0&&<div style={{marginTop:12}}>
            <div style={{fontSize:11,color:"#8d7b5a",fontWeight:600,marginBottom:6}}>ADD FROM ROSTER</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {roster.filter(n=>!gd.lineup.includes(n)).map(n=>
                <button key={n} onClick={()=>{addLatePlayer(n)}} style={{padding:"7px 12px",borderRadius:8,border:"1px solid #c8a96e",background:"transparent",color:"#5a4a2a",fontSize:12,fontWeight:600,cursor:"pointer"}}>{n}</button>)}</div></div>}

          {/* Add brand new player */}
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <input value={lateP} onChange={e=>setLateP(e.target.value)} placeholder="New player name"
              style={{flex:1,padding:"8px 12px",borderRadius:8,border:"1px solid #e0dcc8",fontSize:13,background:"#fff",outline:"none"}}
              onKeyDown={e=>{if(e.key==="Enter"&&lateP.trim()){addLatePlayer(lateP.trim());setLateP("")}}}/>
            <button onClick={()=>{if(lateP.trim()){addLatePlayer(lateP.trim());setLateP("")}}}
              style={{padding:"8px 14px",borderRadius:8,border:"none",background:"#1B5E20",color:"#FFD600",fontWeight:700,cursor:"pointer"}}>+</button>
          </div>

          <button onClick={()=>{setAddLate(false);setLateP("");setDragI(null)}} style={{width:"100%",padding:12,borderRadius:10,border:"none",background:"#1B5E20",color:"#FFD600",fontWeight:800,fontSize:14,cursor:"pointer",marginTop:14}}>DONE</button>
        </div></div>}
    </div>);}

  // ─── SETUP ───
  return(
    <div style={{maxWidth:480,margin:"0 auto",padding:20}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:14,letterSpacing:3,color:"#8d7b5a",fontWeight:600}}>SLO-PITCH</div>
        <div style={{fontSize:32,fontWeight:900,color:"#1B5E20",letterSpacing:2,fontFamily:FM,lineHeight:1.1}}>{TEAM}</div>
        <div style={{fontSize:13,color:"#8d7b5a",marginTop:4}}>STAT TRACKER</div>
        {ld("sync_url","")&&(()=>{const pend=games.filter(g=>!g.synced).length;
          return(<div style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:8,padding:"4px 12px",borderRadius:20,background:pend?"#FFF3E0":"#e8f5e9"}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:pend?"#FF9800":"#4CAF50"}}/>
            <span style={{fontSize:10,fontWeight:700,color:pend?"#E65100":"#2E7D32"}}>{pend?`${pend} game${pend!==1?"s":""} uploading when online…`:"All synced automatically"}</span></div>);})()}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:16}}>
        <button onClick={()=>setScr("stats")} style={{padding:10,borderRadius:10,border:"2px solid #1B5E20",background:"transparent",color:"#1B5E20",fontWeight:700,fontSize:10,cursor:"pointer"}}>STATS</button>
        <button onClick={()=>setScr("history")} style={{padding:10,borderRadius:10,border:"2px solid #1B5E20",background:"transparent",color:"#1B5E20",fontWeight:700,fontSize:10,cursor:"pointer"}}>GAMES</button>
        <button onClick={()=>setScr("sync")} style={{padding:10,borderRadius:10,border:"2px solid #1B5E20",background:"transparent",color:"#1B5E20",fontWeight:700,fontSize:10,cursor:"pointer"}}>SYNC</button>
        <button onClick={()=>setShowShare(true)} disabled={!roster.length} style={{padding:10,borderRadius:10,border:"2px solid #FF9800",background:"transparent",color:"#FF9800",fontWeight:700,fontSize:10,cursor:roster.length?"pointer":"default",opacity:roster.length?1:.4}}>SHARE</button>
      </div>
      <div style={{background:"#faf8f2",borderRadius:16,padding:20,marginBottom:16,border:"1px solid #e0dcc8"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#8d7b5a",marginBottom:12}}>GAME INFO</div>
        <div style={{display:"flex",gap:10,marginBottom:10}}>
          <div style={{flex:2}}><label style={{fontSize:10,fontWeight:700,color:"#1B5E20",marginBottom:4,display:"block"}}>DATE</label>
            <input type="date" value={gDate} onChange={e=>setGDate(e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"2px solid #e0dcc8",fontSize:14,fontFamily:FM,background:"#fff",outline:"none",boxSizing:"border-box"}}/></div>
          <div style={{flex:1}}><label style={{fontSize:10,fontWeight:700,color:"#1B5E20",marginBottom:4,display:"block"}}>GAME #</label>
            <input value={gNum} onChange={e=>setGNum(e.target.value)} placeholder="#" style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"2px solid #e0dcc8",fontSize:14,fontFamily:FM,background:"#fff",outline:"none",textAlign:"center",boxSizing:"border-box"}}/></div></div>
        <div style={{marginBottom:10}}><label style={{fontSize:10,fontWeight:700,color:"#1B5E20",marginBottom:4,display:"block"}}>OPPONENT</label>
          <input value={opp} onChange={e=>setOpp(e.target.value)} placeholder="Team name" style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"2px solid #e0dcc8",fontSize:14,fontFamily:FM,background:"#fff",outline:"none",boxSizing:"border-box"}}/></div>
        <div style={{marginBottom:14}}><label style={{fontSize:10,fontWeight:700,color:"#1B5E20",marginBottom:4,display:"block"}}>FIELD / DIAMOND</label>
          <input value={field} onChange={e=>setField(e.target.value)} placeholder="e.g. Christie Pits Diamond 2" style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"2px solid #e0dcc8",fontSize:14,fontFamily:FM,background:"#fff",outline:"none",boxSizing:"border-box"}}/></div>
        <div><label style={{fontSize:10,fontWeight:700,color:"#1B5E20",marginBottom:6,display:"block"}}>HOME OR AWAY?</label>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setIsHome(false)} style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",cursor:"pointer",background:!isHome?"#1B5E20":"#e8f5e9",color:!isHome?"#FFD600":"#1B5E20",fontWeight:800,fontSize:14,fontFamily:FM}}>AWAY (bat 1st)</button>
            <button onClick={()=>setIsHome(true)} style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",cursor:"pointer",background:isHome?"#1B5E20":"#e8f5e9",color:isHome?"#FFD600":"#1B5E20",fontWeight:800,fontSize:14,fontFamily:FM}}>HOME (bat 2nd)</button></div></div></div>
      <div style={{background:"#faf8f2",borderRadius:16,padding:20,marginBottom:16,border:"1px solid #e0dcc8"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{fontSize:12,fontWeight:700,color:"#8d7b5a"}}>BATTING ORDER</span>
          <span style={{fontSize:11,color:"#2E7D32",fontWeight:600}}>{lineup.length} batter{lineup.length!==1?"s":""}</span></div>
        {!lineup.length&&<div style={{textAlign:"center",padding:"20px 10px",color:"#b0a88a",fontSize:13,fontStyle:"italic",border:"2px dashed #ddd8c4",borderRadius:10,marginBottom:12}}>
          {roster.length?"Tap players from the roster":"Add players below to get started"}</div>}
        {lineup.map((n,i)=><div key={n} draggable onDragStart={()=>setDragI(i)} onDragOver={e=>e.preventDefault()}
          onDrop={()=>{if(dragI!==null){const a=[...lineup];const[it]=a.splice(dragI,1);a.splice(i,0,it);setLineup(a);setDragI(null)}}}
          style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:dragI===i?"#C8E6C9":(i%2===0?"#fff":"#f8f6f0"),borderRadius:8,marginBottom:4,cursor:"grab",border:"1px solid #e8e4d4"}}>
          <span style={{fontSize:10,color:"#8d7b5a",cursor:"grab",userSelect:"none"}}>☰</span>
          <span style={{fontSize:14,fontWeight:800,color:"#1B5E20",fontFamily:FM,width:24,textAlign:"center"}}>{i+1}</span>
          <span style={{fontSize:14,fontWeight:600,color:"#333",flex:1}}>{n}</span>
          <button onClick={()=>setLineup(lineup.filter(x=>x!==n))} style={{background:"none",border:"none",color:"#F44336",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button></div>)}
        {roster.length>0&&<div style={{marginTop:16}}>
          <div style={{fontSize:11,color:"#8d7b5a",fontWeight:600,marginBottom:8}}>ROSTER (tap to add)</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {roster.map(n=>{const inL=lineup.includes(n);return(<div key={n} style={{position:"relative",display:"inline-flex"}}>
              <button onClick={()=>{if(!inL)setLineup(p=>[...p,n])}} style={{padding:"7px 12px",borderRadius:8,
                border:inL?"1px solid #C8E6C9":"1px solid #c8a96e",background:inL?"#e8f5e9":"transparent",
                color:inL?"#81C784":"#5a4a2a",fontSize:12,fontWeight:600,cursor:inL?"default":"pointer",paddingRight:28}}>
                {n}{inL?" ✓":""}</button>
              <button onClick={()=>setRmConf(n)} style={{position:"absolute",right:4,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#ccc",cursor:"pointer",fontSize:14,lineHeight:1}}>×</button></div>)})}</div></div>}
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <input value={newP} onChange={e=>setNewP(e.target.value)} placeholder="Add new player" style={{flex:1,padding:"8px 12px",borderRadius:8,border:"1px solid #e0dcc8",fontSize:13,background:"#fff",outline:"none"}}
            onKeyDown={e=>{if(e.key==="Enter"&&newP.trim()){addP(newP.trim());setNewP("")}}}/>
          <button onClick={()=>{if(newP.trim()){addP(newP.trim());setNewP("")}}} style={{padding:"8px 16px",borderRadius:8,border:"none",background:"#1B5E20",color:"#FFD600",fontWeight:700,fontSize:13,cursor:"pointer"}}>+</button></div></div>
      {(()=>{
        const miss=[];
        if(!opp.trim())miss.push("opponent name");
        if(!field.trim())miss.push("diamond/field");
        if(!String(gNum).trim())miss.push("game #");
        if(!gDate)miss.push("date");
        if(lineup.length<1)miss.push("at least one batter");
        const canStart=miss.length===0;
        return(<React.Fragment>
          {!canStart&&<div style={{background:"#FFF3E0",border:"2px solid #FFB74D",borderRadius:10,padding:"10px 12px",marginBottom:10,fontSize:12,color:"#E65100",fontWeight:600,textAlign:"center"}}>
            Still needed: {miss.join(" • ")}</div>}
          <button onClick={()=>{if(!canStart)return;startG({lineup,opponent:opp,gameNum:gNum,roster,date:gDate,field,isHome})}}
            disabled={!canStart} style={{width:"100%",padding:18,borderRadius:14,border:"none",
              background:!canStart?"#ccc":"#1B5E20",color:"#FFD600",fontWeight:900,fontSize:18,
              cursor:!canStart?"default":"pointer",letterSpacing:2,fontFamily:FM,
              boxShadow:!canStart?"none":"0 6px 24px rgba(27,94,32,.3)"}}>PLAY BALL</button>
        </React.Fragment>);
      })()}
      {rmConf&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:"#faf8f2",borderRadius:16,padding:24,maxWidth:320,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
          <div style={{fontSize:14,fontWeight:600,color:"#333",marginBottom:20}}>Remove {rmConf} from roster?</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setRmConf(null)} style={{flex:1,padding:12,borderRadius:10,border:"2px solid #c8a96e",background:"transparent",color:"#8d7b5a",fontWeight:700,cursor:"pointer"}}>Cancel</button>
            <button onClick={()=>{setRoster(p=>p.filter(x=>x!==rmConf));setLineup(p=>p.filter(x=>x!==rmConf));setRmConf(null)}}
              style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#F44336",color:"#fff",fontWeight:700,cursor:"pointer"}}>Remove</button></div></div></div>}
      {showShare&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:"#faf8f2",borderRadius:16,padding:20,maxWidth:380,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.3)",maxHeight:"90vh",overflowY:"auto"}}>
          {/* Share Roster */}
          <div style={{fontSize:14,fontWeight:700,color:"#1B5E20",marginBottom:4}}>Share Roster</div>
          <div style={{fontSize:11,color:"#8d7b5a",marginBottom:8}}>Send this link to teammates who will be scoring games.</div>
          <div style={{background:"#fff",borderRadius:8,padding:8,border:"1px solid #e0dcc8",marginBottom:8,wordBreak:"break-all",fontSize:9,fontFamily:FM,color:"#555",maxHeight:60,overflowY:"auto"}}>
            {shareUrl()}</div>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <button onClick={copyShare} style={{flex:1,padding:10,borderRadius:10,border:"none",
              background:copied?"#4CAF50":"#FF9800",color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer",transition:"background .3s"}}>
              {copied?"✓ COPIED!":"COPY ROSTER LINK"}</button>
          </div>

          {/* Share Stats (view-only) */}
          {ld("sync_url","")&&<div>
            <div style={{borderTop:"1px solid #e0dcc8",paddingTop:16,marginBottom:4}}>
              <div style={{fontSize:14,fontWeight:700,color:"#4CAF50"}}>Share Stats (View Only)</div>
              <div style={{fontSize:11,color:"#8d7b5a",marginBottom:8}}>Share this link in the group chat. Anyone can view team stats and game history — no editing, no setup needed.</div>
            </div>
            <div style={{background:"#fff",borderRadius:8,padding:8,border:"1px solid #e0dcc8",marginBottom:8,wordBreak:"break-all",fontSize:9,fontFamily:FM,color:"#555",maxHeight:60,overflowY:"auto"}}>
              {statsShareUrl()}</div>
            {(window.location.protocol!=="http:"&&window.location.protocol!=="https:")&&<div style={{background:"#FFEBEE",border:"1px solid #EF9A9A",borderRadius:8,padding:8,marginBottom:8,fontSize:10,color:"#C62828",fontWeight:600}}>
              This app is open from a file, not a web address — teammates can't open this link. Host the HTML online (e.g. GitHub Pages or Netlify) and share that address.</div>}
            <div style={{fontSize:10,color:"#8d7b5a",marginBottom:8,fontStyle:"italic"}}>This link is self-contained — teammates can open it directly with no setup. Make sure you've synced your games first (SYNC button) so there's data to show.</div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <button onClick={()=>{const u=statsShareUrl();
                navigator.clipboard.writeText(u).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000)}).catch(()=>{
                const ta=document.createElement("textarea");ta.value=u;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
                setCopied(true);setTimeout(()=>setCopied(false),2000)})}}
                style={{flex:1,padding:10,borderRadius:10,border:"none",
                  background:copied?"#4CAF50":"#4CAF50",color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>
                COPY STATS LINK</button>
            </div>
          </div>}

          <button onClick={()=>{setShowShare(false);setCopied(false)}} style={{width:"100%",padding:12,borderRadius:10,border:"2px solid #c8a96e",background:"transparent",color:"#8d7b5a",fontWeight:700,cursor:"pointer",marginTop:4}}>Close</button>
        </div></div>}
    </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
